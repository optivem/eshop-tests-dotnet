name: acceptance-stage

on:
  schedule:
    - cron: '*/30 * * * *'  # Run every 30 minutes
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run (even if no new images)'
        required: false
        default: false
        type: boolean

jobs:

  find-latest-images:
    runs-on: ubuntu-latest
    outputs:
      image-digest-urls: ${{ steps.get-digest.outputs.image-digest-urls }}
      latest-image-timestamp: ${{ steps.get-digest.outputs.latest-image-timestamp }}

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Resolve Latest Docker Digests
        id: get-digest
        uses: optivem/find-latest-docker-images-action@v1
        with:
          image-urls: |
            ghcr.io/${{ github.repository_owner }}/eshop/frontend:latest
            ghcr.io/${{ github.repository_owner }}/eshop/backend:latest

  should-run:
    needs: find-latest-images
    if: needs.find-latest-images.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should-run }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Should Run Acceptance Stage
        id: check
        uses: optivem/should-run-acceptance-stage-action@v1
        with:
          latest-image-timestamp: ${{ needs.find-latest-images.outputs.latest-image-timestamp }}
          force-run: ${{ inputs.force_run == true }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  system-test:
    needs: [ should-run, find-latest-images ]
    if: needs.should-run.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy System (Real External Systems)
        uses: ./.github/actions/deploy-docker-images
        with:
          environment: acceptance
          version: latest
          image-urls: ${{ needs.find-latest-images.outputs.image-digest-urls }}
          external-system-mode: 'real'
          frontend-url: 'http://localhost:3001/'
          backend-url: 'http://localhost:8081/health'
          erp-url: 'http://localhost:9001/erp/health'
          tax-url: 'http://localhost:9001/tax/health'

      - name: Deploy System (Stub External Systems)
        uses: ./.github/actions/deploy-docker-images
        with:
          environment: acceptance
          version: latest
          image-urls: ${{ needs.find-latest-images.outputs.image-digest-urls }}
          external-system-mode: 'stub'
          frontend-url: 'http://localhost:3002/'
          backend-url: 'http://localhost:8082/health'
          erp-url: 'http://localhost:9002/erp/health'
          tax-url: 'http://localhost:9002/tax/health'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore system test dependencies
        run: dotnet restore

      - name: Build system tests
        run: dotnet build --no-restore --configuration Release

      - name: Install Playwright browsers
        run: |
          dotnet build
          pwsh bin/Debug/net8.0/playwright.ps1 install --with-deps
        working-directory: ./SystemTests

      # === v1 ===
      - name: v1 - Smoke
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.V1.SmokeTests"
        working-directory: ./SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: v1 - E2E
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.V1.E2eTests"
        working-directory: ./SystemTests
        env:
          ENVIRONMENT: acceptance

      # === v2 ===
      - name: v2 - Smoke
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.V2.SmokeTests"
        working-directory: ./SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: v2 - E2E
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.V2.E2eTests"
        working-directory: ./SystemTests
        env:
          ENVIRONMENT: acceptance

      # === v3 ===
      - name: v3 - Smoke
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.V3.SmokeTests"
        working-directory: ./SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: v3 - E2E
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.V3.E2eTests"
        working-directory: ./SystemTests
        env:
          ENVIRONMENT: acceptance

      # === v4 ===
      - name: v4 - Smoke
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.V4.SmokeTests"
        working-directory: ./SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: v4 - E2E - API Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.V4.E2eTests"
        working-directory: ./SystemTests
        env:
          ENVIRONMENT: acceptance
          CHANNEL: API

      - name: v4 - E2E - UI Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.V4.E2eTests"
        working-directory: ./SystemTests
        env:
          ENVIRONMENT: acceptance
          CHANNEL: UI

      # === v5 ===
      - name: v5 - Smoke
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.V5.SmokeTests"
        working-directory: ./SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: v5 - E2E - API Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.V5.E2eTests"
        working-directory: ./SystemTests
        env:
          ENVIRONMENT: acceptance
          CHANNEL: API

      - name: v5 - E2E - UI Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.V5.E2eTests"
        working-directory: ./SystemTests
        env:
          ENVIRONMENT: acceptance
          CHANNEL: UI

      # === v6 ===
      - name: v6 - Smoke
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.V6.SmokeTests"
        working-directory: ./SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: v6 - E2E - API Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.V6.E2eTests"
        working-directory: ./SystemTests
        env:
          ENVIRONMENT: acceptance
          CHANNEL: API

      - name: v6 - E2E - UI Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.V6.E2eTests"
        working-directory: ./SystemTests
        env:
          ENVIRONMENT: acceptance
          CHANNEL: UI

      # === v7 ===
      - name: v7 - Smoke (Stub)
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.V7.SmokeTests"
        working-directory: ./SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub

      - name: v7 - Smoke (Real)
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.V7.SmokeTests"
        working-directory: ./SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: v7 - Acceptance - API Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.V7.AcceptanceTests&Category!=isolated"
        working-directory: ./SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: API

      - name: v7 - Acceptance - UI Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.V7.AcceptanceTests&Category!=isolated"
        working-directory: ./SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: UI

      - name: v7 - Acceptance (Isolated) - API Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.V7.AcceptanceTests&Category=isolated"
        working-directory: ./SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: API

      - name: v7 - Acceptance (Isolated) - UI Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.V7.AcceptanceTests&Category=isolated"
        working-directory: ./SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: stub
          CHANNEL: UI

      - name: v7 - Contract (Stub)
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.V7.ExternalSystemContractTests&FullyQualifiedName~Stub"
        working-directory: ./SystemTests
        env:
          ENVIRONMENT: acceptance

      - name: v7 - Contract (Real)
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.V7.ExternalSystemContractTests&FullyQualifiedName~Real"
        working-directory: ./SystemTests
        env:
          ENVIRONMENT: acceptance

      - name: v7 - E2E - API Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.V7.E2eTests"
        working-directory: ./SystemTests
        env:
          ENVIRONMENT: acceptance
          CHANNEL: API

      - name: v7 - E2E - UI Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.V7.E2eTests"
        working-directory: ./SystemTests
        env:
          ENVIRONMENT: acceptance
          CHANNEL: UI
