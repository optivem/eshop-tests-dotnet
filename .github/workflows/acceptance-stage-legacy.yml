name: acceptance-stage-legacy

on:
  schedule:
    - cron: '0 0 * * *'  # Run daily
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run (even if no new images)'
        required: false
        default: false
        type: boolean

jobs:

  find-latest-images:
    runs-on: ubuntu-latest
    outputs:
      image-digest-urls: ${{ steps.get-digest.outputs.image-digest-urls }}
      latest-image-timestamp: ${{ steps.get-digest.outputs.latest-image-timestamp }}

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Resolve Latest Docker Digests
        id: get-digest
        uses: optivem/find-latest-docker-images-action@v1
        with:
          image-urls: |
            ghcr.io/${{ github.repository_owner }}/eshop/frontend:latest
            ghcr.io/${{ github.repository_owner }}/eshop/backend:latest

  should-run:
    needs: find-latest-images
    if: needs.find-latest-images.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should-run }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Should Run Acceptance Stage
        id: check
        uses: optivem/should-run-acceptance-stage-action@v1
        with:
          latest-image-timestamp: ${{ needs.find-latest-images.outputs.latest-image-timestamp }}
          force-run: ${{ inputs.force_run == true }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  system-test:
    needs: [ should-run, find-latest-images ]
    if: needs.should-run.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy System (Real External Systems)
        uses: ./.github/actions/deploy-docker-images
        with:
          environment: acceptance
          version: latest
          image-urls: ${{ needs.find-latest-images.outputs.image-digest-urls }}
          external-system-mode: 'real'
          frontend-url: 'http://localhost:3001/'
          backend-url: 'http://localhost:8081/health'
          erp-url: 'http://localhost:9001/erp/health'
          tax-url: 'http://localhost:9001/tax/health'

      - name: Deploy System (Stub External Systems)
        uses: ./.github/actions/deploy-docker-images
        with:
          environment: acceptance
          version: latest
          image-urls: ${{ needs.find-latest-images.outputs.image-digest-urls }}
          external-system-mode: 'stub'
          frontend-url: 'http://localhost:3002/'
          backend-url: 'http://localhost:8082/health'
          erp-url: 'http://localhost:9002/erp/health'
          tax-url: 'http://localhost:9002/tax/health'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore system test dependencies
        run: dotnet restore

      - name: Build system tests
        run: dotnet build --no-restore --configuration Release

      - name: Install Playwright browsers
        run: |
          dotnet build
          pwsh bin/Debug/net8.0/playwright.ps1 install --with-deps
        working-directory: ./SystemTests

      # === mod02: Smoke ===
      - name: mod02 - Smoke
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Legacy.Mod02.SmokeTests"
        working-directory: ./SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      # === mod03: Smoke + E2E ===
      - name: mod03 - Smoke
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Legacy.Mod03.SmokeTests"
        working-directory: ./SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: mod03 - E2E
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Legacy.Mod03.E2eTests"
        working-directory: ./SystemTests
        env:
          ENVIRONMENT: acceptance

      # === mod04: Smoke + E2E ===
      - name: mod04 - Smoke
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Legacy.Mod04.SmokeTests"
        working-directory: ./SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: mod04 - E2E
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Legacy.Mod04.E2eTests"
        working-directory: ./SystemTests
        env:
          ENVIRONMENT: acceptance

      # === mod05: Smoke + E2E ===
      - name: mod05 - Smoke
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Legacy.Mod05.SmokeTests"
        working-directory: ./SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: mod05 - E2E
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Legacy.Mod05.E2eTests"
        working-directory: ./SystemTests
        env:
          ENVIRONMENT: acceptance

      # === mod06: Smoke + E2E ===
      - name: mod06 - Smoke
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Legacy.Mod06.SmokeTests"
        working-directory: ./SystemTests
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: real

      - name: mod06 - E2E - API Channel
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName~.Legacy.Mod06.E2eTests"
        working-directory: ./SystemTests
